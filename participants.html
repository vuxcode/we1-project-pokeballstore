<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>Participants</title>
  <meta name="color-scheme" content="dark">
  <link rel="stylesheet" href="style.css">
</head>

<body>

<header>
  <h1>Participants</h1>
  <p>People signed up for the event</p>
</header>

<main>
  <section class="event-section">
    <h2>Participant List</h2>

    <ul class="participants-list" id="participants-list">
      <!-- JavaScript will fill this -->
    </ul>

  </section>
</main>

<nav>
  <p>
    <a href="index.html">Back to home</a>
  </p>
</nav>

<footer>
  <p>Data stored locally in browser</p>
</footer>

<script>
const list = document.getElementById("participants-list");
const rawParticipants = localStorage.getItem("participants");

console.log("Raw from localStorage:", rawParticipants);

const participants = JSON.parse(rawParticipants) || [];

console.log("Parsed participants:", participants);

list.innerHTML = "";

participants.forEach(function(name) {
  const li = document.createElement("li");
  li.textContent = name;
  list.appendChild(li);
});
</script>

</body>
</html>
